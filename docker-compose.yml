services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: travel-planner
    ports:
      - "4000:4000"
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
  
  redis:
    image: redis:7-alpine
    container_name: travel-planner-redis
    volumes:
      - redis-data:/data
    command: redis-server
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  redis-data:
    driver: local
